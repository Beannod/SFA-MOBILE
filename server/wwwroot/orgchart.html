<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Org Chart  SFA</title>
<script src="auth.js"></script>
<style>
:root {
  --primary:#4361ee; --primary-dark:#3a0ca3;
  --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
  --gray-500:#64748b; --gray-700:#334155; --gray-900:#0f172a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4ff;color:var(--gray-700);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.page-header{background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 60%,#4cc9f0 100%);color:#fff;box-shadow:0 4px 20px rgba(67,97,238,.35);flex-shrink:0;}
.page-header-inner{padding:13px 22px;display:flex;align-items:center;gap:12px;}
.header-icon{width:38px;height:38px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.header-title{font-size:1.08em;font-weight:700;}
.header-sub{font-size:.73em;opacity:.72;margin-top:1px;}
.header-user-badge{margin-left:auto;background:rgba(255,255,255,.18);border-radius:20px;padding:5px 14px;font-size:.78em;font-weight:600;white-space:nowrap;}
.toolbar-float{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.96);border:1px solid var(--gray-200);border-radius:40px;padding:6px 12px;box-shadow:0 4px 20px rgba(67,97,238,.18);backdrop-filter:blur(8px);flex-wrap:nowrap;}
.search-box{display:flex;align-items:center;gap:5px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:20px;padding:4px 11px;width:220px;}
.search-box input{border:none;background:transparent;outline:none;font-size:.83em;width:100%;color:var(--gray-700);}
.sep{width:1px;height:20px;background:var(--gray-200);margin:0 3px;flex-shrink:0;}
.tbtn{width:32px;height:32px;border-radius:50%;border:1px solid var(--gray-200);background:#fff;color:var(--gray-600);font-size:1em;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.tbtn:hover{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(67,97,238,.35);}
.tbtn[title]:hover::after{content:attr(title);position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;font-size:.7em;font-weight:600;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:99;}
.zoom-lbl{font-size:.78em;color:var(--gray-700);font-weight:700;min-width:40px;text-align:center;letter-spacing:-.01em;}
#chart-wrap{flex:1;overflow:hidden;position:relative;background:radial-gradient(ellipse at center,#e8edfb 0%,#dde4f7 100%);}
#canvas{will-change:transform;transform-origin:0 0;position:absolute;top:0;left:0;padding:40px;}
.tree-node{display:flex;flex-direction:column;align-items:center;}
.card{width:172px;border-radius:10px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.1);border:2px solid #ccc;overflow:hidden;cursor:pointer;user-select:none;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 4px 18px rgba(67,97,238,.28);transform:translateY(-2px);}
.card.highlight{border-color:#f59e0b !important;box-shadow:0 0 0 3px #fef3c7;}
.card-stripe{height:6px;}
.card-body{padding:9px 10px 8px;display:flex;align-items:flex-start;gap:0;}
.card-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82em;color:#fff;flex-shrink:0;margin-right:8px;margin-top:1px;}
.card-info{flex:1;min-width:0;}
.card-name{font-size:.8em;font-weight:700;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-desig{font-size:.68em;color:var(--primary);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-territory{font-size:.64em;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:var(--gray-50);border-top:1px solid var(--gray-100);font-size:.65em;color:var(--gray-500);}
.toggle-btn{width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1;color:#fff;padding-bottom:1px;}
.v-line{width:2px;height:22px;background:#b8c4e8;flex-shrink:0;}
.children-row{display:flex;flex-direction:row;align-items:flex-start;position:relative;}
.children-row::before{content:'';position:absolute;top:0;left:calc(var(--first-offset, 50%));right:calc(100% - var(--last-offset, 50%));height:2px;background:#b8c4e8;}
.child-col{display:flex;flex-direction:column;align-items:center;padding:0 12px;}
.tip{position:fixed;background:#fff;border:1px solid var(--gray-200);border-radius:10px;padding:12px 14px;box-shadow:0 6px 24px rgba(0,0,0,.13);pointer-events:none;z-index:9999;width:240px;display:none;font-size:.82em;}
.tip-name{font-weight:700;font-size:1em;color:var(--gray-900);margin-bottom:3px;}
.tip-desig{font-size:.85em;color:var(--primary);font-weight:600;margin-bottom:6px;}
.tip-row{display:flex;gap:5px;margin-bottom:2px;color:var(--gray-500);}
.tip-val{color:var(--gray-700);font-weight:500;}
.chip{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.78em;font-weight:600;margin-right:3px;}
.legend-float{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.93);border:1px solid var(--gray-200);border-radius:10px;padding:10px 13px;display:flex;flex-direction:column;gap:5px;box-shadow:0 2px 10px rgba(0,0,0,.08);z-index:10;}
.legend-title{font-size:.69em;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.leg-item{display:flex;align-items:center;gap:6px;font-size:.75em;color:var(--gray-700);}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.stat-bar{position:absolute;bottom:12px;left:14px;display:flex;gap:7px;}
.stat-pill{background:rgba(255,255,255,.88);border-radius:20px;padding:4px 12px;font-size:.74em;font-weight:600;color:var(--gray-700);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.hint{position:absolute;bottom:12px;right:14px;font-size:.72em;color:var(--gray-500);background:rgba(255,255,255,.8);border-radius:8px;padding:4px 9px;}
.center-msg{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:10px;}
</style>
</head>
<body>
<div class="page-header">
  <div class="page-header-inner">
    <div class="header-icon"></div>
    <div>
      <div class="header-title">Organisation Chart</div>
      <div class="header-sub">Click nodes to expand  hover for details  scroll/pinch to zoom</div>
    </div>
    <div class="header-user-badge" id="user-badge">Loading</div>
  </div>
</div>
<div id="chart-wrap">
  <!-- Floating toolbar -->
  <div class="toolbar-float">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search…">
    </div>
    <div class="sep"></div>
    <button class="tbtn" id="btn-expand" title="Expand All">⊞</button>
    <button class="tbtn" id="btn-collapse" title="Collapse All">⊟</button>
    <div class="sep"></div>
    <button class="tbtn" id="btn-fit" title="Fit to Screen">⛶</button>
    <button class="tbtn" id="btn-zi" title="Zoom In">＋</button>
    <span class="zoom-lbl" id="zoom-lbl">100%</span>
    <button class="tbtn" id="btn-zo" title="Zoom Out">－</button>
    <div class="sep"></div>
    <button class="tbtn" id="btn-reset" title="Reset View">↺</button>
  </div>
  <div id="canvas"></div>
  <div class="legend-float">
    <div class="legend-title">Level</div>
    <div class="leg-item"><div class="leg-dot" style="background:#6366f1"></div>Sales Head</div>
    <div class="leg-item"><div class="leg-dot" style="background:#8b5cf6"></div>Zonal Mgr</div>
    <div class="leg-item"><div class="leg-dot" style="background:#0ea5e9"></div>Regional SM</div>
    <div class="leg-item"><div class="leg-dot" style="background:#10b981"></div>Area SM</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f59e0b"></div>Sr. Sales Exec</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Sales Exec</div>
  </div>
  <div class="stat-bar" id="stat-bar"></div>
  <div class="hint">Scroll to zoom  Drag to pan  Click card or ＋/- to expand</div>
</div>
<div class="tip" id="tip"></div>
<script>
var SESSION_KEY='sfa_admin_user';
function getUser(){try{return JSON.parse(localStorage.getItem(SESSION_KEY));}catch(e){return null;}}
var _u=getUser();
document.getElementById('user-badge').textContent=_u?(_u.fullName||_u.username)+' ('+_u.role+')':'';

var COLORS={1:'#6366f1',2:'#8b5cf6',3:'#0ea5e9',4:'#10b981',5:'#f59e0b',6:'#ef4444'};
function col(lvl){return COLORS[lvl]||'#64748b';}
function initials(name){return(name||'?').trim().split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();}
function trunc(s,n){return s&&s.length>n?s.slice(0,n)+'':(s||'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function shortDesig(d){
  return(d||'')
    .replace('Regional Sales Manager','RSM')
    .replace('Senior Sales Executive','SSE')
    .replace('Area Sales Manager','ASM')
    .replace('Sales Executive','SE')
    .replace('Zonal Manager','Zonal Mgr');
}

  var treeData=null, nodeMap={}, collapsed={}, searchTerm='';
  var orgChartDebug = document.createElement('div');
  orgChartDebug.style.cssText = 'position:fixed;left:14px;top:78px;z-index:9999;background:rgba(255,255,255,0.92);border:1px solid var(--gray-200);padding:10px 12px;border-radius:12px;max-width:520px;font-size:12px;display:none;white-space:pre-wrap;color:var(--gray-700)';
  orgChartDebug.id = 'orgchart-debug';
  document.body.appendChild(orgChartDebug);
  function dbg(s){
    orgChartDebug.style.display = 'block';
    orgChartDebug.textContent = s;
  }

var tx=40,ty=40,scale=1,dragging=false,lastX,lastY;
var wrap=document.getElementById('chart-wrap');
var canvas=document.getElementById('canvas');

function applyTransform(){
  canvas.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';
  document.getElementById('zoom-lbl').textContent=Math.round(scale*100)+'%';
}
wrap.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=wrap.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  var d=e.deltaY<0?1.12:0.89,ns=Math.min(3,Math.max(0.1,scale*d));
  tx=mx-(mx-tx)*(ns/scale);ty=my-(my-ty)*(ns/scale);scale=ns;applyTransform();
},{passive:false});
wrap.addEventListener('mousedown',function(e){
  if(e.target.closest('.card')||e.target.closest('.toggle-btn'))return;
  dragging=true;lastX=e.clientX;lastY=e.clientY;wrap.style.cursor='grabbing';
});
window.addEventListener('mousemove',function(e){
  if(!dragging)return;tx+=e.clientX-lastX;ty+=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;applyTransform();
});
window.addEventListener('mouseup',function(){dragging=false;wrap.style.cursor='';});

function fitView(){
  var wW=wrap.clientWidth,wH=wrap.clientHeight;
  var cW=canvas.scrollWidth,cH=canvas.scrollHeight;
  if(!cW||!cH)return;
  var s=Math.min(0.9*wW/cW,0.9*wH/cH,1);
  scale=s;tx=(wW-cW*s)/2;ty=(wH-cH*s)/2;applyTransform();
}
document.getElementById('btn-fit').addEventListener('click',fitView);
document.getElementById('btn-zi').addEventListener('click',function(){scale=Math.min(3,scale*1.25);applyTransform();});
document.getElementById('btn-zo').addEventListener('click',function(){scale=Math.max(0.1,scale*0.8);applyTransform();});
document.getElementById('btn-reset').addEventListener('click',function(){scale=1;tx=40;ty=40;applyTransform();});

var tip=document.getElementById('tip');
function showTip(e,node){
  var c=col(node.designationLevel);
  tip.innerHTML='<div class="tip-name">'+esc(node.fullName||node.username)+'</div>'+
    '<div class="tip-desig">'+esc(node.designation||node.role||'')+'</div>'+
    (node.employeeCode?'<div class="tip-row"> <span class="tip-val">'+esc(node.employeeCode)+'</span></div>':'')+
    (node.territory?'<div class="tip-row"> <span class="tip-val">'+esc(node.territory)+'</span></div>':'')+
    (node.city?'<div class="tip-row"> <span class="tip-val">'+esc(node.city)+'</span></div>':'')+
    (node.reportsToName?'<div class="tip-row"> Reports to: <span class="tip-val">'+esc(node.reportsToName)+'</span></div>':'')+
    '<div style="margin-top:6px">'+
      '<span class="chip" style="background:'+c+'22;color:'+c+'">'+esc(node.role)+'</span>'+
      '<span class="chip" style="background:'+(node.isActive?'#dcfce7':'#fee2e2')+';color:'+(node.isActive?'#16a34a':'#dc2626')+'">'+(node.isActive?'Active':'Inactive')+'</span>'+
      '<span class="chip" style="background:#e0e7ff;color:#4361ee">'+(node.directReports?node.directReports.length:0)+' reports</span>'+
    '</div>';
  tip.style.display='block';moveTip(e);
}
function moveTip(e){
  var x=e.clientX+14,y=e.clientY-10;
  if(x+250>window.innerWidth)x=e.clientX-260;
  if(y+200>window.innerHeight)y=e.clientY-180;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function hideTip(){tip.style.display='none';}

function countAll(nodes){var n=0;(nodes||[]).forEach(function(d){n+=1+countAll(d.directReports);});return n;}
function countVisible(nodes){
  var n=0;(nodes||[]).forEach(function(d){n++;if(!collapsed[d.id])n+=countVisible(d.directReports);});return n;
}
function setAllCollapsed(nodes,val){
  (nodes||[]).forEach(function(d){
    if(d.directReports&&d.directReports.length)collapsed[d.id]=val;
    setAllCollapsed(d.directReports,val);
  });
}
document.getElementById('btn-expand').addEventListener('click',function(){setAllCollapsed(treeData,false);render();setTimeout(fitView,150);});
document.getElementById('btn-collapse').addEventListener('click',function(){setAllCollapsed(treeData,true);render();setTimeout(fitView,150);});
document.getElementById('search-input').addEventListener('input',function(){searchTerm=this.value.trim().toLowerCase();render();});

function matches(node){
  if(!searchTerm)return false;
  return(node.fullName||'').toLowerCase().includes(searchTerm)||
    (node.designation||'').toLowerCase().includes(searchTerm)||
    (node.territory||'').toLowerCase().includes(searchTerm)||
    (node.username||'').toLowerCase().includes(searchTerm);
}

function renderNode(node){
  var c=col(node.designationLevel);
  var isCollapsed=!!collapsed[node.id];
  var hasChildren=node.directReports&&node.directReports.length>0;
  var isMatch=matches(node);
  var opacity=node.isActive===false?'0.65':'1';
  var html='<div class="tree-node">';
  html+='<div class="card'+(isMatch?' highlight':'')+'" data-id="'+node.id+'" style="border-color:'+c+';opacity:'+opacity+'">'+
    '<div class="card-stripe" style="background:'+c+'"></div>'+
    '<div class="card-body">'+
      '<div class="card-avatar" style="background:'+c+'">'+esc(initials(node.fullName||node.username))+'</div>'+
      '<div class="card-info">'+
        '<div class="card-name">'+esc(trunc(node.fullName||node.username,18))+'</div>'+
        '<div class="card-desig">'+esc(shortDesig(node.designation||node.role))+'</div>'+
        (node.territory?'<div class="card-territory"> '+esc(trunc(node.territory,20))+'</div>':'')+
      '</div>'+
    '</div>'+
    '<div class="card-footer">'+
      '<span style="font-size:.68em">'+esc(node.employeeCode||node.role||'')+'</span>'+
      (hasChildren
        ?'<button class="toggle-btn" data-id="'+node.id+'" style="background:'+c+'">'+(isCollapsed?'+':'')+'</button>'
        :'<span></span>')+
    '</div>'+
  '</div>';
  if(hasChildren&&!isCollapsed){
    html+='<div class="v-line"></div>';
    var kids=node.directReports;
    html+='<div class="children-row">';
    kids.forEach(function(child){
      html+='<div class="child-col"><div class="v-line"></div>'+renderNode(child)+'</div>';
    });
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function attachEvents(){
  canvas.querySelectorAll('.toggle-btn').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var id=+this.getAttribute('data-id');
      collapsed[id]=!collapsed[id];render();
    });
  });
  canvas.querySelectorAll('.card').forEach(function(card){
    var id=+card.getAttribute('data-id'),node=nodeMap[id];
    if(!node)return;
    card.addEventListener('mouseenter',function(e){showTip(e,node);});
    card.addEventListener('mousemove',moveTip);
    card.addEventListener('mouseleave',hideTip);
    card.addEventListener('click',function(e){
      if(e.target.closest('.toggle-btn'))return;
      if(node.directReports&&node.directReports.length){collapsed[id]=!collapsed[id];render();}
    });
  });
}

function buildMap(nodes){(nodes||[]).forEach(function(n){nodeMap[n.id]=n;buildMap(n.directReports);});}

function render(){
  if(!treeData)return;
  document.getElementById('stat-bar').innerHTML=
    '<div class="stat-pill"> '+countAll(treeData)+' Total</div>'+
    '<div class="stat-pill"> '+countVisible(treeData)+' Visible</div>';
  var html='<div style="display:flex;flex-direction:row;align-items:flex-start;gap:20px;">';
  treeData.forEach(function(root){html+=renderNode(root);});
  html+='</div>';
  canvas.innerHTML=html;
  attachEvents();
}

async function load(){
  canvas.innerHTML='<div class="center-msg"><div style="font-size:2em"></div><div>Loading org chart</div></div>';
  try{
    var res=await fetch('/api/users/hierarchy');
    if(!res.ok)throw new Error('HTTP '+res.status);
    treeData=await res.json();
    buildMap(treeData);
    function initCollapse(nodes,depth){
      (nodes||[]).forEach(function(n){
        if(depth>=2&&n.directReports&&n.directReports.length)collapsed[n.id]=true;
        initCollapse(n.directReports,depth+1);
      });
    }
    initCollapse(treeData,0);
    render();
    setTimeout(fitView,150);
  }catch(err){
    canvas.innerHTML='<div class="center-msg"><div style="font-size:2em"></div>'+
      '<div style="font-weight:700;color:#ef4444">Could not load org chart</div>'+
      '<div style="color:var(--gray-500);font-size:.85em">'+esc(String(err))+'</div>'+
      '<button onclick="load()" style="margin-top:10px;padding:8px 20px;border-radius:8px;background:#4361ee;color:#fff;border:none;cursor:pointer;font-weight:600"> Retry</button></div>';
  }
}
load();
</script>
</body>
</html>
