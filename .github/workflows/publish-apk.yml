name: Publish APK and update manifest

on:
  workflow_dispatch:
    inputs:
      apk_path:
        description: 'Path to APK (relative to repo root)'
        required: true
        default: 'mobile/app/build/outputs/apk/release/app-release.apk'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '1'
      version_name:
        description: 'Version name (e.g. 1.2.3)'
        required: true
        default: '1.0.0'
      notes:
        description: 'Release notes'
        required: false
        default: ''
      mandatory:
        description: 'Set to true for mandatory update'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK (for build tools)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64

      - name: Build APK (assembleRelease)
        run: |
          chmod +x ./mobile/gradlew
          cd mobile
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          release_name: Release v${{ github.event.inputs.version_name }}
          body: ${{ github.event.inputs.notes }}
          draft: false
          prerelease: false

      - name: Upload APK as Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ github.event.inputs.apk_path }}
          asset_name: sfa-mobile-${{ github.event.inputs.version_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Update manifest (commit only manifest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          pwsh -NoProfile -File ./scripts/publish-apk.ps1 \
            -ApkPath "${{ github.event.inputs.apk_path }}" \
            -VersionCode "${{ github.event.inputs.version_code }}" \
            -VersionName "${{ github.event.inputs.version_name }}" \
            -Notes "${{ github.event.inputs.notes }}" \
            -Mandatory:$([bool]::Parse('${{ github.event.inputs.mandatory }}') ) \
            -UploadToRelease:$true
