services:
  - type: web
    name: sfa-api
    runtime: docker
    # Render builds from the /server subdirectory
    rootDir: server
    buildCommand: dotnet restore && dotnet publish -c Release -o out
    startCommand: dotnet out/SfaApi.dll
    plan: free                      # change to "starter" or higher for production
    healthCheckPath: /api/health

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      # Connection string — set in Render dashboard (keep secret)
      - key: ConnectionStrings__DefaultConnection
        sync: false

      # (Optional) JWT — needed when Phase 4 JWT auth is implemented
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
