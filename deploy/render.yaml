services:
  - type: web
    name: sfa-api
    runtime: docker
    # Build from backend/server; copy frontend assets from repo root into wwwroot
    rootDir: backend/server
    buildCommand: bash -lc "cp -R ../frontend/web-ui/* wwwroot/ || true; dotnet restore && dotnet publish -c Release -o out"
    startCommand: dotnet out/SfaApi.dll
    plan: free                      # change to "starter" or higher for production
    healthCheckPath: /api/health

    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      # Connection string — set in Render dashboard (keep secret)
      - key: ConnectionStrings__DefaultConnection
        sync: false

      # (Optional) JWT — needed when Phase 4 JWT auth is implemented
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        sync: false
      - key: Jwt__Audience
        sync: false
